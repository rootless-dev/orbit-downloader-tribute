name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-dmg:
    name: Build & publish DMG (macOS arm64)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-14
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install dependencies
        run: brew install qt create-dmg

      - name: Configure (Release)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"
          -DORBIT_VERSION="${VERSION}"

      - name: Build
        run: cmake --build build

      - name: Deploy Qt frameworks & create DMG
        run: |
          set -euo pipefail
          APP="build/src/gui/Orbit.app"
          "$(brew --prefix qt)/bin/macdeployqt" "$APP"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          DMG="Orbit-${VERSION}-arm64.dmg"
          create-dmg \
            --volname "Orbit ${VERSION}" \
            --window-size 600 320 \
            --icon-size 120 \
            --icon "Orbit.app" 150 170 \
            --app-drop-link 450 170 \
            --hide-extension "Orbit.app" \
            "$DMG" "$STAGE"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload DMG to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "$DMG" --clobber
